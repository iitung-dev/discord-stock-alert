name: Stock Drop Monitor

on:
  schedule:
    # Runs every 30 minutes, Monday through Friday (UTC time)
    # Market hours (EST) are roughly 14:30 - 21:00 UTC
    - cron: '*/30 14-21 * * 1-5'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run stock monitor
      env:
        # We store the Webhook URL as a "Secret" for security
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      run: python test_discord.py